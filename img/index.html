<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <style>
        /* White Theme Styles */
        body { margin: 0; background: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
            padding: 8px;
        }
        .gallery img { 
            width: 100%; 
            aspect-ratio: 1 / 1; 
            object-fit: cover; 
            display: block; 
            cursor: pointer; 
            border-radius: 8px;
            background-color: #f0f0f0; /* Placeholder color for images loading */
        }
        
        /* Light Viewer Overlay */
        #viewer { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.98); display:none; flex-direction:column; align-items:center; justify-content:center; z-index: 1000; }
        #viewer img { max-width: 90%; max-height: 70%; object-fit: contain; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .controls { color: #000; margin-top: 20px; text-align: center; }
        
        /* White Theme Buttons */
        button { padding: 12px 24px; margin: 5px; cursor: pointer; border-radius: 8px; border: 1px solid #ddd; background: #f9f9f9; color: #000; font-weight: 600; }
        button:active { background: #e0e0e0; }
    </style>
</head>
<body>

<div class="gallery" id="gallery"></div>

<div id="viewer" onclick="this.style.display='none'">
    <img id="viewImg" src="">
    <div class="controls" onclick="event.stopPropagation()">
        <button onclick="copyData()">Copy Link</button>
    </div>
</div>

<script>
    const baseUrl = "https://samy.nav.bd/img/";
    const gallery = document.getElementById('gallery');

    function createImg(fileName) {
        const img = document.createElement('img');
        img.src = baseUrl + fileName;
        img.onerror = function() { this.style.display = 'none'; };
        img.onclick = () => showViewer(img.src);
        gallery.appendChild(img);
    }

    // 1. Automatic 1 to 100
    for(let i = 1; i <= 100; i++) {
        createImg(i + ".png");
    }

    // 2. Load from JSON list
    fetch('img.json')
        .then(r => r.json())
        .then(data => {
            data.forEach(fileName => createImg(fileName));
        })
        .catch(() => console.log("No img.json found."));

    function showViewer(src) {
        document.getElementById('viewImg').src = src;
        document.getElementById('viewer').style.display = 'flex';
    }

    function copyData() {
        const url = document.getElementById('viewImg').src;
        navigator.clipboard.writeText(url);
        alert("Link copied to clipboard!");
    }
</script>

</body>
</html>
