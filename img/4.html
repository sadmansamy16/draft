<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="icon.png">
    <title>Samy Gallery</title>
    <style>
        body { margin: 0; background: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #333; }
        
        .nav-container { padding: 15px; display: flex; justify-content: center; }
        .modern-btn { 
            background: #000; color: #fff; padding: 10px 20px; border-radius: 50px; 
            text-decoration: none; font-weight: 600; font-size: 0.85rem; 
        }

        /* 3-Column Layout */
        h2 { padding: 10px 16px; margin: 0; font-size: 1.1rem; }
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
            padding: 5px 16px 20px 16px; 
        }
        .gallery img { 
            width: 100%; aspect-ratio: 1 / 1; object-fit: cover; 
            display: block; cursor: pointer; border-radius: 8px; background: #f0f0f0; 
        }
        
        #viewer { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.95); display:none; flex-direction:column; align-items:center; justify-content:center; z-index: 1000; }
        #viewer img { max-width: 85%; max-height: 60%; object-fit: contain; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .controls { color: #000; margin-top: 20px; text-align: center; max-width: 90%; }
        .copy-btn { padding: 10px 20px; cursor: pointer; border-radius: 8px; border: none; background: #eee; font-weight: 600; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="nav-container">
        <a href="https://samy.nav.bd/img/" class="modern-btn" target="_blank">Open Directory →</a>
    </div>

    <h2>Samy Gallery</h2>
    <div class="gallery" id="samyGallery"></div>

    <h2>Favicon Gallery</h2>
    <div class="gallery" id="bitwGallery"></div>

    <div id="viewer" onclick="this.style.display='none'">
        <img id="viewImg" src="" alt="Full view">
        <div class="controls" onclick="event.stopPropagation()">
            <p id="imgLink" style="font-size: 0.75rem; color: #666;"></p>
            <button class="copy-btn" onclick="copyData()">Copy Link</button>
        </div>
    </div>

    <script>
        const samyGallery = document.getElementById('samyGallery');
        const bwiGallery = document.getElementById('bitwGallery');

        function createImg(src, container) {
            const img = document.createElement('img');
            img.src = src;
            img.onerror = function() { this.style.display = 'none'; };
            img.onclick = () => {
                document.getElementById('viewImg').src = src;
                document.getElementById('imgLink').innerText = src;
                document.getElementById('viewer').style.display = 'flex';
            };
            container.appendChild(img);
        }

        // Load Samy Images
        for(let i = 1; i <= 100; i++) createImg(`https://samy.nav.bd/img/${i}.png`, samyGallery);
        ["bing.webp", "brave.webp", "duckduckgo.webp", "google.webp", "sflix.film.png", "6t.png", "7e.png", "8r.png", "9c.png", "1d0.png"].forEach(f => createImg("https://samy.nav.bd/img/" + f, samyGallery));

        // Load Bitw Subdomains
        const subs = ["dbbl","nidw","noor","prottoyon","pi","steadfast","wechat","banglacall","weblink","premium","icc","icon","anilab","fxyxcg","a","b","c","d","e","f","g","h","i","j","k","l","m","n","o","p","q","r","s","t","u","v","w","x","y","z","aa","bb","cc","dd","ee","ff","gg","hh","ii","jj","kk","ll","mm","nn","oo","pp","qq","rr","ss","tt","uu","vv","ww","xx","yy","zz"];
        subs.forEach(s => createImg(`https://${s}.bitw.pages.dev/icon.png`, bwiGallery));

        function copyData() {
            navigator.clipboard.writeText(document.getElementById('viewImg').src);
            alert("Link copied!");
        }
    </script>
</body>
</html>
