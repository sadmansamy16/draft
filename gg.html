<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Qsamy Search</title>
    <!-- [Include your existing CSS here: Header, Search Bar, etc.] -->
    <style>
        .section-container { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .shortcuts-grid { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .iframe-wrapper { width: 100%; height: 600px; border-radius: 20px; overflow: hidden; border: 1px solid #e8e8ed; background: #fff; }
    </style>
</head>
<body>
    <div class="workspace">
        <!-- Search Bar remains same -->
        
        <!-- JSON Shortcuts Section -->
        <div class="section-container">
            <div class="shortcuts-grid" id="jsonShortcutsGrid"></div>
        </div>

        <!-- Management Section via Iframe -->
        <div class="section-container">
            <div class="section-title">Manage Local Shortcuts</div>
            <div class="iframe-wrapper">
                <iframe src="https://samy.pro.bd/gg" style="width:100%; height:100%; border:none;"></iframe>
            </div>
        </div>
    </div>
    
    <script>
        // Load JSON as before
        async function loadShortcuts() {
            const response = await fetch('/weblist1.json');
            const data = await response.json();
            document.getElementById('jsonShortcutsGrid').innerHTML = data.map(item => `
                <a class="shortcut-item" href="${item.url}">
                    <div class="icon-container"><img src="${item.img}"></div>
                    <div class="shortcut-title">${item.name}</div>
                </a>`).join('');
        }
        loadShortcuts();
    </script>
</body>
</html>
