<!DOCTYPE html>
<html>
<head>
    <style>
        .app-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px 10px; /* Vertical and horizontal spacing */
            padding: 20px;
        }
        .app-item { 
            text-align: center; 
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-item img { 
            width: 100px; /* Larger size to match your reference */
            height: 100px; 
            border-radius: 22px; /* Smoother rounded-square look */
            object-fit: cover;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); /* Subtle shadow like Play Store */
        }
        .app-title { 
            font-size: 14px; 
            margin-top: 10px; 
            line-height: 1.2;
            display: -webkit-box; 
            -webkit-line-clamp: 2; /* Forces text to wrap to 2 lines */
            -webkit-box-orient: vertical; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            width: 100%;
            padding: 0 5px;
        }
    </style>
</head>
<body>

<div class="app-grid" id="appContainer"></div>

<script>
    fetch('app.json?t=' + Date.now())
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('appContainer');
            data.forEach(app => {
                const div = document.createElement('div');
                div.className = 'app-item';
                div.onclick = () => window.location.href = app.url;
                div.innerHTML = `
                    <img src="${app.img}" alt="${app.title}">
                    <div class="app-title">${app.title}</div>
                `;
                container.appendChild(div);
            });
        });
</script>
</body>
</html>
