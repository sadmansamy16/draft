<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { margin: 0; padding: 10px; font-family: sans-serif; }
        .app-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 25px 15px; /* Spacing between rows and columns */
            padding: 10px;
        }
        .app-item { 
            text-align: center; 
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-item img { 
            width: 100%; /* Force the icon to fill the grid column */
            max-width: 120px; /* Limits size on very large screens */
            aspect-ratio: 1 / 1; /* Keeps it perfectly square */
            border-radius: 22px; /* Standard Android rounded-square */
            object-fit: cover;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15); /* Adds depth */
        }
        .app-title { 
            font-size: 13px; 
            margin-top: 10px; 
            line-height: 1.3;
            color: #333;
            display: -webkit-box; 
            -webkit-line-clamp: 2; /* Truncate after 2 lines */
            -webkit-box-orient: vertical; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            width: 100%;
            padding: 0 2px;
        }
    </style>
</head>
<body>

<div class="app-grid" id="appContainer"></div>

<script>
    // Fetching with a timestamp to prevent caching
    fetch('app.json?t=' + Date.now())
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById('appContainer');
            data.forEach(app => {
                const div = document.createElement('div');
                div.className = 'app-item';
                div.onclick = () => window.location.href = app.url;
                div.innerHTML = `
                    <img src="${app.img}" alt="${app.title}">
                    <div class="app-title">${app.title}</div>
                `;
                container.appendChild(div);
            });
        });
</script>
</body>
</html>
