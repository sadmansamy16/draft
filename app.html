<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Store Gallery</title>
    <style>
        body { margin: 0; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fff; }
        
        .gallery { 
            display: grid; 
            /* 3 columns to match your screenshot */
            grid-template-columns: repeat(3, 1fr); 
            /* Tight spacing for the store look */
            gap: 25px 15px; 
        }
        
        .app-item { 
            text-align: center; 
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Large, rounded-square icon styling */
        .app-item img { 
            width: 100%; 
            max-width: 120px; /* Big size */
            aspect-ratio: 1 / 1; 
            object-fit: cover; 
            border-radius: 26px; /* Optimized rounded-square */
            box-shadow: 0 6px 12px rgba(0,0,0,0.15); /* Depth effect */
            display: block;
        }
        
        /* Title styling with 2-line auto-wrap */
        .app-title { 
            font-size: 14px; 
            margin-top: 10px; 
            line-height: 1.3;
            color: #202124;
            display: -webkit-box; 
            -webkit-line-clamp: 2; /* Forces 2 lines */
            -webkit-box-orient: vertical; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="gallery" id="appGallery"></div>

    <script>
        // REPLACE 'app.json' with 'app.jsom' if that is your filename
        const jsonFileName = 'app.json'; 

        const gallery = document.getElementById('appGallery');

        fetch(jsonFileName + '?t=' + Date.now())
            .then(response => response.json())
            .then(data => {
                gallery.innerHTML = ""; 
                data.forEach(app => {
                    const div = document.createElement('div');
                    div.className = 'app-item';
                    div.onclick = () => window.location.href = app.url;
                    
                    div.innerHTML = `
                        <img src="${app.img}" alt="${app.title}">
                        <div class="app-title">${app.title}</div>
                    `;
                    gallery.appendChild(div);
                });
            })
            .catch(err => console.error("Error loading file:", err));
    </script>
</body>
</html>
