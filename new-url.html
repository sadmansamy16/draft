<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShortURL Link Generator</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            --panel-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --accent-primary: #4f46e5;
            --accent-primary-hover: #4338ca;
            --accent-success: #10b981;
            --accent-success-hover: #059669;
            --accent-secondary: #6366f1;
            --accent-secondary-hover: #4f46e5;
            --border-color: #e2e8f0;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Modern Card Styling */
        .card {
            background: var(--panel-bg);
            padding: 32px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            max-width: 520px;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        h2 { 
            margin: 0 0 20px 0; 
            color: var(--text-main); 
            font-size: 24px; 
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            font-size: 14px;
            color: var(--text-muted);
        }

        /* Modern Inputs */
        input[type="url"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            box-sizing: border-box;
            font-size: 16px;
            margin-bottom: 20px;
            transition: all 0.2s ease;
            background: #f8fafc;
        }
        input[type="url"]:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        /* Inline Grid Buttons */
        .btn-row {
            display: flex;
            gap: 12px;
            margin-bottom: 0;
        }

        button.action-btn {
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            flex: 1;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        button.action-btn:active {
            transform: scale(0.98);
        }

        .btn-fast { background-color: var(--accent-success); }
        .btn-fast:hover { background-color: var(--accent-success-hover); }

        .btn-ui { background-color: var(--accent-primary); }
        .btn-ui:hover { background-color: var(--accent-primary-hover); }

        /* Moved Layout Component: View DB button styled on top of its container */
        .database-controller {
            max-width: 520px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 12px;
        }

        .btn-view { 
            background-color: #ffffff; 
            color: var(--accent-secondary) !important;
            border: 2px solid var(--accent-secondary) !important;
            width: 100%; 
        }
        .btn-view:hover { 
            background-color: var(--accent-secondary); 
            color: #ffffff !important;
        }
        
        /* Smooth Code Block Architecture */
        .result-box {
            margin-top: 24px;
            padding: 20px;
            background: #f8fafc;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            display: none;
        }
        .result-box p { margin: 0 0 16px 0; }

        .code-container {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        pre {
            background: #0f172a;
            color: #38bdf8;
            padding: 16px;
            border-radius: var(--radius-md);
            overflow-x: auto;
            font-size: 14px;
            font-family: 'Fira Code', Consolas, Monaco, monospace;
            margin: 0;
            white-space: pre-wrap;
            border: 1px solid #1e293b;
        }
        button.copy-btn {
            width: 100%;
            background: var(--text-main);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }
        button.copy-btn:hover { background: #1e293b; }

        /* Modernized List Container */
        .list-card {
            background: var(--panel-bg);
            padding: 28px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            width: 100%;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            display: none;
        }
        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 14px;
        }
        .list-header h3 { margin: 0; color: var(--text-main); font-size: 18px; }
        
        #linkCount {
            font-size: 13px; 
            font-weight: 600;
            background: #e0e7ff; 
            color: var(--accent-primary); 
            padding: 4px 12px; 
            border-radius: 20px;
        }

        .url-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 8px;
            border-bottom: 1px solid #f1f5f9;
            gap: 20px;
            transition: background 0.15s ease;
        }
        .url-item:hover {
            background-color: #f8fafc;
            border-radius: var(--radius-sm);
        }
        .url-item:last-child { border-bottom: none; }
        
        .url-key {
            font-family: monospace;
            font-weight: 700;
            background: #f1f5f9;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            color: #db2777;
            font-size: 13px;
        }
        .url-link {
            text-decoration: none;
            color: var(--accent-primary);
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
            font-size: 14px;
            font-weight: 500;
            flex: 1;
            text-align: right;
        }
        .url-link:hover { 
            color: var(--accent-primary-hover);
            text-decoration: underline; 
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Generate 2-Digit ShortURL</h2>
        
        <label for="longUrl">Destination Website URL</label>
        <input type="url" id="longUrl" placeholder="https://example.com" required>
        
        <div class="btn-row">
            <button class="action-btn btn-fast" onclick="generateShortUrl(false)">Fast Link</button>
            <button class="action-btn btn-ui" onclick="generateShortUrl(true)">UI Link</button>
        </div>

        <div id="result" class="result-box">
            <p style="font-size: 15px;"><strong>Public Link:</strong><br>
            <span id="shortLinkDisplay" style="color: var(--accent-primary); font-weight:700; word-break:break-all; display:inline-block; margin-top:4px;"></span></p>
            
            <label>JSON Code Line</label>
            <div class="code-container">
                <pre><code id="jsonCodeDisplay"></code></pre>
                <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">Copy Code Line</button>
            </div>
        </div>
    </div>

    <div class="database-controller">
        <button class="action-btn btn-view" onclick="toggleJsonListView()">View Live Link Database</button>
        
        <div id="listCard" class="list-card">
            <div class="list-header">
                <h3>Active Short Links</h3>
                <span id="linkCount">0 links</span>
            </div>
            <div id="urlContainer">Loading data...</div>
        </div>
    </div>

    <script>
        const chars = '0123456789abcdefghijklmnopqrstuvwxyz';
        let stringToCopy = ""; 

        async function generateShortUrl(isUiSelected) {
            const longUrlInput = document.getElementById('longUrl').value.trim();
            const resultBox = document.getElementById('result');
            
            if (!longUrlInput) {
                alert('Please enter a valid URL.');
                return;
            }

            try {
                const response = await fetch('/urls.json');
                if (!response.ok) throw new Error();
                const existingData = await response.json();

                let uniqueCode = '';
                let isDuplicate = true;
                let attempts = 0;
                const maxCombinations = 1296; 

                while (isDuplicate && attempts < maxCombinations) {
                    const char1 = chars[Math.floor(Math.random() * chars.length)];
                    const char2 = chars[Math.floor(Math.random() * chars.length)];
                    uniqueCode = char1 + char2;

                    if (!existingData.hasOwnProperty(uniqueCode) && !existingData.hasOwnProperty('ui-' + uniqueCode)) {
                        isDuplicate = false;
                    }
                    attempts++;
                }

                if (isDuplicate) {
                    alert('Database full!');
                    return;
                }

                const baseUrl = window.location.origin;
                const pathCode = isUiSelected ? `ui-${uniqueCode}` : uniqueCode;
                const fullPublicUrl = `${baseUrl}/${pathCode}`;
                
                stringToCopy = `  "${pathCode}": "${longUrlInput}",\n`;

                document.getElementById('shortLinkDisplay').innerText = fullPublicUrl;
                document.getElementById('jsonCodeDisplay').innerText = stringToCopy;
                
                document.getElementById('copyBtn').innerText = "Copy Code Line";
                resultBox.style.display = 'block';

                if (document.getElementById('listCard').style.display === 'block') {
                    renderActiveLinks(existingData);
                }

            } catch (error) {
                alert('Error: Check if urls.json is active in your GitHub root directory.');
            }
        }

        function copyToClipboard() {
            if (!stringToCopy) return;
            navigator.clipboard.writeText(stringToCopy).then(() => {
                const copyBtn = document.getElementById('copyBtn');
                copyBtn.innerText = "Copied to Clipboard!";
                setTimeout(() => { copyBtn.innerText = "Copy Code Line"; }, 2000);
            });
        }

        async function toggleJsonListView() {
            const listCard = document.getElementById('listCard');
            if (listCard.style.display === 'block') {
                listCard.style.display = 'none';
                return;
            }

            try {
                const response = await fetch('/urls.json');
                if (!response.ok) throw new Error();
                const data = await response.json();
                
                renderActiveLinks(data);
                listCard.style.display = 'block';
            } catch (e) {
                alert('Could not fetch URL data file.');
            }
        }

        function renderActiveLinks(data) {
            const container = document.getElementById('urlContainer');
            const keys = Object.keys(data);
            document.getElementById('linkCount').innerText = `${keys.length} links`;
            
            if (keys.length === 0) {
                container.innerHTML = '<p style="color:#666; font-size:14px; text-align:center;">No active links found.</p>';
                return;
            }

            let html = '';
            for (const key of keys) {
                const destination = data[key];
                html += `
                    <div class="url-item">
                        <span class="url-key">${key}</span>
                        <a href="${destination}" target="_blank" class="url-link" title="${destination}">${destination}</a>
                    </div>
                `;
            }
            container.innerHTML = html;
        }
    </script>

</body>
</html>
