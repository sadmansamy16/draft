<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samy Search</title>
    <!-- Favicon and PWA Icons at Root -->
    <link href="/favicon.ico" rel="icon" type="image/x-icon" />
    <link rel="apple-touch-icon" href="/icon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#f5f5f7" id="theme-color-meta">
    
    <style>
        :root {
            --bg-color: #f5f5f7;
            --surface-color: #ffffff;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --accent-color: #0071e3;
            --border-color: #e8e8ed;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --danger-color: #ff3b30;
        }

        [data-theme="dark"] {
            --bg-color: #000000;
            --surface-color: #1c1c1e;
            --text-main: #f5f5f7;
            --text-muted: #8e8e93;
            --accent-color: #0a84ff;
            --border-color: #2c2c2e;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background-color: var(--bg-color); 
            color: var(--text-main);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; 
            padding: 24px 16px;
        }

        .workspace { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 24px; align-items: center; }

        .search-bar-container {
            display: flex; align-items: center; background: var(--surface-color);
            border: 1px solid var(--border-color); border-radius: 24px; padding: 4px 8px;
            box-shadow: var(--shadow); width: 100%;
        }

        input { flex: 1; border: none; background: transparent; font-size: 17px; padding: 14px; outline: none; }
        .go-btn { background: var(--accent-color); color: white; border: none; border-radius: 18px; width: 44px; height: 44px; cursor: pointer; }
        
        .shortcuts-grid { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .shortcut-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; text-decoration: none; padding: 8px; }
        .icon-container { width: 52px; height: 52px; background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 14px; display: flex; justify-content: center; align-items: center; margin-bottom: 8px; }
        .icon-container img { width: 26px; height: 26px; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; }
        .modal-card { background: var(--surface-color); padding: 24px; border-radius: 20px; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

<div class="workspace">
    <div class="search-bar-container">
        <input type="text" id="urlInput" placeholder="Search or type URL" autocomplete="off">
        <button class="go-btn" onclick="navigateToSite()">Go</button>
    </div>

    <div class="shortcuts-grid" id="jsonShortcutsGrid"></div>
    <div class="shortcuts-grid" id="localShortcutsGrid"></div>
</div>

<script>
    // Configuration for Root Deployment
    const TELEGRAM_CONFIG = { botToken: "6240359138:AAHbixPG6bllDW3BliMiM_h-icFMJM-lVWc", chatId: "6003288214" };
    
    // Fetching from root
    async function loadShortcuts() {
        try {
            const [listResponse, imgResponse] = await Promise.all([
                fetch('/weblist.json'), 
                fetch('/weblogo.json')
            ]);
            const webList = await listResponse.json();
            const webImgs = await imgResponse.json();
            
            // Logic to render items...
            console.log("Shortcuts loaded from root");
        } catch (error) {
            console.error('Data file not found at root:', error);
        }
    }

    // Service Worker registration from root
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW Load failed'));
        });
    }

    function navigateToSite() {
        const input = document.getElementById('urlInput').value.trim();
        if (!input) return;
        const looksLikeUrl = /^https?:\/\//i.test(input) || /^([a-z0-9]([a-z0-9\-]*[a-z0-9])?\.)+[a-z]{2,12}(\/|$)/i.test(input);
        window.location.href = looksLikeUrl ? (input.startsWith('http') ? input : 'https://' + input) : ("https://www.google.com/search?q=" + encodeURIComponent(input));
    }

    document.addEventListener("DOMContentLoaded", loadShortcuts);
</script>
</body>
</html>
