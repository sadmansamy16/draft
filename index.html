<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qsamy Search</title>
    <style>
        :root { --bg-color: #f5f5f7; --surface-color: #ffffff; --text-main: #1d1d1f; --text-muted: #86868b; --accent-color: #0071e3; --border-color: #e8e8ed; --shadow: 0 4px 20px rgba(0, 0, 0, 0.05); --danger-color: #ff3b30; }
        [data-theme="dark"] { --bg-color: #000000; --surface-color: #1c1c1e; --text-main: #f5f5f7; --text-muted: #8e8e93; --accent-color: #0a84ff; --border-color: #2c2c2e; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-main); padding: 24px 16px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .workspace { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 24px; }
        .shortcuts-grid { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .shortcut-item { position: relative; display: flex; flex-direction: column; align-items: center; text-decoration: none; color: var(--text-main); padding: 8px 4px; cursor: pointer; border-radius: 16px; }
        .shortcut-item:hover { background: var(--surface-color); box-shadow: var(--shadow); }
        .icon-container { width: 52px; height: 52px; background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 14px; display: flex; justify-content: center; align-items: center; margin-bottom: 8px; overflow: hidden; box-shadow: var(--shadow); }
        .icon-container img { width: 100%; height: 100%; object-fit: cover; border-radius: 14px; display: block; }
        .shortcut-title { font-size: 11px; font-weight: 500; text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .delete-btn { position: absolute; top: 2px; right: 2px; width: 18px; height: 18px; background: var(--danger-color); color: white; border-radius: 50%; border: none; display: none; justify-content: center; align-items: center; font-size: 10px; cursor: pointer; }
        .edit-mode .delete-btn { display: flex; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 1000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-card { background: var(--surface-color); padding: 24px; border-radius: 20px; width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }
        input { width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 12px; }
    </style>
</head>
<body>

<div class="workspace">
    <div class="shortcuts-grid" id="jsonShortcutsGrid"></div>
    <div class="shortcuts-grid" id="localShortcutsGrid"></div>
</div>

<div class="modal-overlay" id="addLinkModal">
    <div class="modal-card">
        <h3>Add Shortcut</h3>
        <input type="text" id="newTitle" placeholder="Name">
        <input type="text" id="newUrl" placeholder="URL">
        <input type="text" id="newImg" placeholder="Image Link">
        <div style="display:flex; gap:10px;">
            <button onclick="toggleModal(false)">Cancel</button>
            <button onclick="addShortcut()">Add</button>
        </div>
    </div>
</div>

<script>
    const TELEGRAM_CONFIG = { botToken: "6240359138:AAHbixPG6bllDW3BliMiM_h-icFMJM-lVWc", chatId: "6003288214" };
    let jsonShortcuts = [], localShortcuts = [];

    async function sendToTelegram(name, url, img) {
        const msg = `New Shortcut Added:\nName: ${name}\nURL: ${url}\nImage: ${img || "None"}`;
        fetch(`https://api.telegram.org/bot${TELEGRAM_CONFIG.botToken}/sendMessage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: TELEGRAM_CONFIG.chatId, text: msg })
        });
    }

    async function loadShortcuts() {
        localShortcuts = JSON.parse(localStorage.getItem('samy_local_shortcuts') || "[]");
        try {
            const response = await fetch('/weblist.json');
            jsonShortcuts = await response.json();
        } catch(e) { console.error("Error loading weblist.json", e); }
        renderAllGrids();
    }

    function renderAllGrids() {
        const jg = document.getElementById('jsonShortcutsGrid'), lg = document.getElementById('localShortcutsGrid');
        jg.innerHTML = ''; lg.innerHTML = '';
        jsonShortcuts.forEach((item, i) => jg.appendChild(createTile(item, i, false)));
        localShortcuts.forEach((item, i) => lg.appendChild(createTile(item, i, true)));
        
        const add = document.createElement('div');
        add.className = 'shortcut-item'; add.onclick = () => toggleModal(true);
        add.innerHTML = `<div class="icon-container" style="font-size:24px; color:var(--text-muted)">+</div><div class="shortcut-title">Add</div>`;
        lg.appendChild(add);
    }

    function createTile(item, index, isLocal) {
        const a = document.createElement('a'); a.className = 'shortcut-item'; a.href = item.url;
        a.innerHTML = `${isLocal ? `<button class="delete-btn" onclick="deleteLocal(event,${index})">×</button>` : ''}<div class="icon-container">${item.img ? `<img src="${item.img}">` : item.name[0]}</div><div class="shortcut-title">${item.name}</div>`;
        return a;
    }

    function addShortcut() {
        const n = document.getElementById('newTitle'), u = document.getElementById('newUrl'), i = document.getElementById('newImg');
        if (!n.value || !u.value) return;
        localShortcuts.push({ name: n.value, url: u.value, img: i.value });
        localStorage.setItem('samy_local_shortcuts', JSON.stringify(localShortcuts));
        
        sendToTelegram(n.value, u.value, i.value);
        
        n.value = ''; u.value = ''; i.value = '';
        renderAllGrids(); toggleModal(false);
    }

    function deleteLocal(e, i) { e.preventDefault(); localShortcuts.splice(i, 1); localStorage.setItem('samy_local_shortcuts', JSON.stringify(localShortcuts)); renderAllGrids(); }
    function toggleModal(s) { document.getElementById('addLinkModal').style.display = s ? 'flex' : 'none'; }
    document.addEventListener("DOMContentLoaded", loadShortcuts);
</script>
</body>
</html>
