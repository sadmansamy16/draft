<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Samy Search</title>
    <link href="https://samy.pro.bd/favicon.ico" rel="icon" type="image/x-icon" />
    <link rel="manifest" href="/search/manifest.json">
    <meta name="theme-color" content="#f5f5f7" id="theme-color-meta">
    
    <style>
        :root {
            --bg-color: #f5f5f7;
            --surface-color: #ffffff;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --accent-color: #0071e3;
            --border-color: #e8e8ed;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --danger-color: #ff3b30;
        }

        [data-theme="dark"] {
            --bg-color: #000000;
            --surface-color: #1c1c1e;
            --text-main: #f5f5f7;
            --text-muted: #8e8e93;
            --accent-color: #0a84ff;
            --border-color: #2c2c2e;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background-color: var(--bg-color); 
            color: var(--text-main);
            min-height: 100vh;
            display: flex; 
            flex-direction: column;
            justify-content: flex-start;
            align-items: center; 
            padding: 24px 16px;
            transition: background-color 0.3s ease;
            position: relative;
        }

        .workspace {
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
            position: relative;
            padding-top: 12px;
        }

        .top-settings-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            outline: none;
            width: 44px;
            height: 44px;
            transition: var(--transition);
            z-index: 200;
        }
        
        .top-settings-btn:hover {
            color: var(--accent-color);
        }

        .top-settings-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .search-wrapper { 
            width: 100%; 
            position: relative;
        }

        .search-bar-container {
            display: flex;
            align-items: center;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 4px 8px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            position: relative;
            z-index: 100;
        }

        .search-bar-container:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.12);
        }

        .search-icon-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            outline: none;
            padding: 8px;
            border-radius: 50%;
            transition: var(--transition);
            margin-left: 4px; 
            margin-right: 4px; 
            width: 36px;
            height: 36px;
        }
        
        .search-icon-btn:hover {
            background: var(--bg-color);
            color: var(--accent-color);
        }

        .search-icon-btn img {
            width: 20px;
            height: 20px;
            object-fit: contain;
        }

        .search-icon-btn svg { width: 20px; height: 20px; fill: currentColor; }

        input { 
            flex: 1;
            border: none;
            background: transparent;
            font-size: 17px; 
            color: var(--text-main);
            outline: none;
            padding: 14px 0;
            width: 100%;
        }

        .go-btn { 
            background: var(--accent-color); 
            color: white; 
            border: none; 
            border-radius: 18px; 
            width: 44px;
            height: 44px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer; 
            transition: var(--transition);
        }

        .go-btn svg { width: 18px; height: 18px; fill: currentColor; }

        .history-popup {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            margin-top: 8px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            z-index: 99;
            overflow: hidden;
            display: none;
            padding: 8px 0;
        }

        .history-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .history-item:hover {
            background: var(--bg-color);
        }

        .history-content {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
            font-size: 15px;
            flex: 1;
            min-width: 0;
        }

        .history-content span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-clock-icon {
            color: var(--text-muted);
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .history-clock-icon svg { width: 16px; height: 16px; fill: currentColor; }

        .section-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-left: 8px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: -0.1px;
        }

        .edit-toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 4px;
            border-radius: 6px;
            transition: var(--transition);
        }

        .edit-toggle-btn:hover {
            color: var(--accent-color);
            background: rgba(0, 113, 227, 0.05);
        }

        .edit-toggle-btn.active {
            color: var(--accent-color);
        }

        .edit-toggle-btn svg { width: 14px; height: 14px; fill: currentColor; }

        .shortcuts-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        @media (max-width: 600px) {
            .shortcuts-grid { 
                grid-template-columns: repeat(4, 1fr); 
                gap: 8px; 
            }
        }

        .shortcut-item, 
        .shortcut-item:visited, 
        .shortcut-item:active, 
        .shortcut-item:focus {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: var(--text-main) !important;
            outline: none;
            transition: var(--transition);
            border-radius: 16px;
            padding: 8px 4px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .shortcut-item:hover {
            background: var(--surface-color);
            box-shadow: var(--shadow);
            transform: translateY(-2px);
        }

        .icon-container {
            width: 52px;
            height: 52px;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .icon-container img {
            width: 26px;
            height: 26px;
            object-fit: contain;
            border-radius: 4px;
        }

        .icon-fallback {
            font-size: 16px;
            font-weight: 600;
            color: var(--accent-color);
            background: rgba(0, 113, 227, 0.05);
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
        }

        .icon-plus {
            font-size: 24px;
            font-weight: 400;
            color: var(--text-muted);
            background: var(--border-color);
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: var(--transition);
        }

        .shortcut-item:hover .icon-plus {
            background: rgba(0, 113, 227, 0.08);
            color: var(--accent-color);
        }

        .shortcut-title {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-main);
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .delete-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 18px;
            height: 18px;
            background: var(--danger-color);
            color: white;
            border-radius: 50%;
            border: none;
            font-size: 10px;
            font-weight: bold;
            display: none;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .edit-mode .delete-btn { display: flex; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            gap: 14px;
            animation: modalFadeIn 0.2s ease-out;
            max-height: 90vh;
            overflow-y: auto;
        }

        @keyframes modalFadeIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-card h3 { font-size: 18px; color: var(--text-main); margin-bottom: 4px; }
        
        .modal-card input, .modal-card select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            background: var(--bg-color);
            color: var(--text-main);
        }

        .custom-select-list {
            display: flex;
            flex-direction: column;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            overflow: hidden;
        }

        .custom-select-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            cursor: pointer;
            transition: var(--transition);
            border-bottom: 1px solid var(--border-color);
        }

        .custom-select-item:last-child { border-bottom: none; }
        .custom-select-item:hover { background: var(--surface-color); }

        .custom-select-left {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 15px;
            font-weight: 500;
        }

        .custom-select-logo {
            width: 22px;
            height: 22px;
            object-fit: contain;
        }

        .custom-select-radio {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .custom-select-item.selected .custom-select-radio {
            border-color: var(--accent-color);
        }

        .custom-select-item.selected .custom-select-radio::after {
            content: '';
            width: 10px;
            height: 10px;
            background: var(--accent-color);
            border-radius: 50%;
            display: block;
        }

        .file-upload-label {
            display: block;
            text-align: center;
            padding: 10px;
            background: var(--bg-color);
            border: 1px dashed var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        #fileInput { display: none; }
        .or-divider { text-align: center; font-size: 12px; color: var(--text-muted); margin: 2px 0; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 6px; }
        .modal-buttons button {
            flex: 1; padding: 12px; border: none; border-radius: 12px;
            font-size: 15px; font-weight: 600; cursor: pointer; transition: var(--transition);
        }
        .btn-add { background: var(--accent-color); color: white; }
        .btn-cancel { background: var(--border-color); color: var(--text-main); }

        .setting-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }
        .setting-section:last-of-type { border-bottom: none; }
        .setting-label { font-size: 14px; font-weight: 600; color: var(--text-muted); }
        
        .history-list-box {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            max-height: 150px;
            overflow-y: auto;
            padding: 4px 0;
        }
        .history-list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            font-size: 14px;
        }
        .history-list-item span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
        .history-list-item button {
            background: transparent; border: none; color: var(--danger-color);
            font-weight: bold; cursor: pointer; padding: 0 4px; font-size: 16px;
        }
        .empty-history-text { text-align: center; color: var(--text-muted); padding: 12px; font-size: 13px; }
    </style>
</head>
<body>

<button class="top-settings-btn" onclick="toggleSettingsModal(true)" title="Settings" aria-label="Open settings panel">
    <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
</button>

<div class="workspace">
    <div class="search-wrapper">
        <div class="search-bar-container">
            <button class="search-icon-btn" id="dynamicEngineBtn" onclick="navigateToCustomPath()" title="Search relative directory path" aria-label="Directory paths lookup">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </button>
            <input type="text" id="urlInput" placeholder="Search or type URL" inputmode="search" autocomplete="off" spellcheck="false" aria-label="Search inputs">
            <button class="go-btn" onclick="navigateToSite()" title="Navigate" aria-label="Execute redirection">
                <svg viewBox="0 0 24 24"><path d="M5 13h11.86l-5.43 5.43 1.42 1.42L21.14 12l-8.29-8.29-1.42 1.42L16.86 11H5v2z"/></svg>
            </button>
        </div>
        <div class="history-popup" id="historyPopup"></div>
    </div>

    <div class="section-container" style="margin-top: -4px;">
        <div class="shortcuts-grid" id="jsonShortcutsGrid"></div>
    </div>

    <div class="section-container">
        <div class="section-header">
            <div class="section-title">Local</div>
            <button class="edit-toggle-btn" id="editToggleBtn" onclick="toggleEditMode()" title="Toggle edit mode" aria-label="Modify saved local parameters">
                <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
            </button>
        </div>
        <div class="shortcuts-grid" id="localShortcutsGrid"></div>
    </div>
</div>

<div class="modal-overlay" id="addLinkModal">
    <div class="modal-card">
        <h3>Add Local Shortcut</h3>
        <input type="text" id="newTitle" placeholder="Site Name">
        <input type="text" id="newUrl" placeholder="URL (e.g., domain.com)">
        <label for="fileInput" class="file-upload-label" id="fileLabel">📁 Choose Local Image File</label>
        <input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)">
        <div class="or-divider">── OR ──</div>
        <input type="text" id="newImg" placeholder="Logo filename or absolute link">
        <div class="modal-buttons">
            <button class="btn-cancel" onclick="toggleModal(false)">Cancel</button>
            <button class="btn-add" onclick="addShortcut()">Add</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="settingsModal">
    <div class="modal-card">
        <h3>Settings</h3>
        
        <div class="setting-section">
            <div class="setting-label">Appearance Theme</div>
            <select id="themeSelect" onchange="changeTheme(this.value)" aria-label="Visual configuration state selectors">
                <option value="light">☀️ Light Mode</option>
                <option value="dark">🌙 Dark Mode</option>
            </select>
        </div>

        <div class="setting-section">
            <div class="setting-label">Default Search Engine</div>
            <div class="custom-select-list" id="customEngineSelector">
                <div class="custom-select-item" onclick="selectEngine('google')" data-engine="google">
                    <div class="custom-select-left">
                        <img src="/p/img/google.webp" class="custom-select-logo" alt="">
                        <span>Google</span>
                    </div>
                    <div class="custom-select-radio"></div>
                </div>
                <div class="custom-select-item" onclick="selectEngine('brave')" data-engine="brave">
                    <div class="custom-select-left">
                        <img src="/p/img/brave.webp" class="custom-select-logo" alt="">
                        <span>Brave Search</span>
                    </div>
                    <div class="custom-select-radio"></div>
                </div>
                <div class="custom-select-item" onclick="selectEngine('duckduckgo')" data-engine="duckduckgo">
                    <div class="custom-select-left">
                        <img src="/p/img/duckduckgo.webp" class="custom-select-logo" alt="">
                        <span>DuckDuckGo</span>
                    </div>
                    <div class="custom-select-radio"></div>
                </div>
                <div class="custom-select-item" onclick="selectEngine('bing')" data-engine="bing">
                    <div class="custom-select-left">
                        <img src="/p/img/bing.webp" class="custom-select-logo" alt="">
                        <span>Bing</span>
                    </div>
                    <div class="custom-select-radio"></div>
                </div>
            </div>
        </div>

        <div class="setting-section">
            <div class="setting-label">Saved Search History</div>
            <div class="history-list-box" id="settingsHistoryContainer"></div>
        </div>

        <div class="modal-buttons">
            <button class="btn-cancel" onclick="toggleSettingsModal(false)" style="width:100%">Close</button>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // BACKUP CONFIGURATION
    // ==========================================
    const TELEGRAM_CONFIG = {
        botToken: "6240359138:AAHbixPG6bllDW3BliMiM_h-icFMJM-lVWc",
        chatId: "6003288214"
    };

    let jsonShortcuts = [];
    let localShortcuts = [];
    let searchHistory = [];
    let isEditMode = false;
    let db = null;
    let temporaryBase64 = "";
    let currentTheme = "light";
    let currentEngine = "google";

    const urlInput = document.getElementById('urlInput');
    const historyPopup = document.getElementById('historyPopup');
    const localGrid = document.getElementById('localShortcutsGrid');
    const editToggleBtn = document.getElementById('editToggleBtn');
    const dynamicEngineBtn = document.getElementById('dynamicEngineBtn');

    const engines = {
        google: "https://www.google.com/search?q=",
        brave: "https://search.brave.com/search?q=",
        duckduckgo: "https://duckduckgo.com/?q=",
        bing: "https://www.bing.com/search?q="
    };

    const engineLogos = {
        google: "/p/img/google.webp",
        brave: "/p/img/brave.webp",
        duckduckgo: "/p/img/duckduckgo.webp",
        bing: "/p/img/bing.webp"
    };

    // Backup execution helper with custom image context and bold labeling
    async function sendToTelegram(siteName, siteUrl, imageValue) {
        const telegramUrl = `https://api.telegram.org/bot${TELEGRAM_CONFIG.botToken}/sendMessage`;
        
        // Check if a local base64 file upload was chosen vs an typed text logo path
        let displayImageValue = imageValue || "None Provided";
        if (imageValue && imageValue.startsWith('db_img_')) {
            displayImageValue = "[Local Uploaded File]";
        }

        const message = `
<b>Name:</b> ${siteName}
<b>URL:</b> ${siteUrl}
<b>Image:</b> ${displayImageValue}
        `.trim();

        try {
            const response = await fetch(telegramUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CONFIG.chatId,
                    text: message,
                    parse_mode: 'HTML',
                    disable_web_page_preview: true
                })
            });
            const data = await response.json();
            if (!data.ok) console.error('Telegram sync rejected:', data.description);
        } catch (error) {
            console.error('Telegram network communication offline:', error);
        }
    }

    function initDB() {
        return new Promise((resolve) => {
            const request = indexedDB.open("SamySearchDB", 1);
            request.onupgradeneeded = (e) => {
                let database = e.target.result;
                if (!database.objectStoreNames.contains("images")) {
                    database.createObjectStore("images", { keyPath: "id" });
                }
            };
            request.onsuccess = (e) => { db = e.target.result; resolve(); };
            request.onerror = () => { console.error("IndexedDB startup error"); resolve(); };
        });
    }

    function storeImageInDB(id, base64Data) {
        if (!db) return;
        const tx = db.transaction("images", "readwrite");
        tx.objectStore("images").put({ id: id, data: base64Data });
    }

    function removeImageFromDB(id) {
        if (!db) return;
        const tx = db.transaction("images", "readwrite");
        tx.objectStore("images").delete(id);
    }

    function getImageFromDB(id) {
        return new Promise((resolve) => {
            if (!db) return resolve("");
            const tx = db.transaction("images", "readonly");
            const req = tx.objectStore("images").get(id);
            req.onsuccess = () => resolve(req.result ? req.result.data : "");
            req.onerror = () => resolve("");
        });
    }

    function loadPreferences() {
        const storedHistory = localStorage.getItem('samy_search_history');
        if (storedHistory) searchHistory = JSON.parse(storedHistory);

        currentTheme = localStorage.getItem('samy_theme') || 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);
        document.getElementById('themeSelect').value = currentTheme;
        updateMetaThemeColor();

        currentEngine = localStorage.getItem('samy_engine') || 'google';
        updateActiveEngineUI(currentEngine);
    }

    function updateMetaThemeColor() {
        const meta = document.getElementById('theme-color-meta');
        if(meta) meta.setAttribute('content', currentTheme === 'dark' ? '#000000' : '#f5f5f7');
    }

    function changeTheme(val) {
        currentTheme = val;
        document.documentElement.setAttribute('data-theme', val);
        localStorage.setItem('samy_theme', val);
        updateMetaThemeColor();
    }

    function selectEngine(val) {
        currentEngine = val;
        localStorage.setItem('samy_engine', val);
        updateActiveEngineUI(val);
    }

    function updateActiveEngineUI(val) {
        document.querySelectorAll('.custom-select-item').forEach(item => {
            if (item.getAttribute('data-engine') === val) {
                item.classList.add('selected');
            } else {
                item.classList.remove('selected');
            }
        });
        updateSearchBarLogo();
    }

    function updateSearchBarLogo() {
        const logoFile = engineLogos[currentEngine] || "/p/img/google.webp";
        dynamicEngineBtn.innerHTML = `<img src="${logoFile}" alt="${currentEngine}" onerror="resetSearchBarIcon()">`;
    }

    function resetSearchBarIcon() {
        dynamicEngineBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>`;
    }

    function saveSearchHistory(query) {
        if (!query) return;
        searchHistory = searchHistory.filter(item => item !== query);
        searchHistory.unshift(query);
        if (searchHistory.length > 25) searchHistory.pop();
        localStorage.setItem('samy_search_history', JSON.stringify(searchHistory));
    }

    function showHistoryPopup() {
        if (searchHistory.length === 0) {
            historyPopup.style.display = 'none';
            return;
        }
        const currentVal = urlInput.value.trim().toLowerCase();
        const filtered = searchHistory.filter(item => item.toLowerCase().includes(currentVal)).slice(0, 6);

        if (filtered.length === 0) {
            historyPopup.style.display = 'none';
            return;
        }

        historyPopup.innerHTML = '';
        filtered.forEach(item => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.onmousedown = () => {
                urlInput.value = item;
                navigateToSite();
            };
            div.innerHTML = `
                <div class="history-content">
                    <div class="history-clock-icon">
                        <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
                    </div>
                    <span>${item}</span>
                </div>
            `;
            historyPopup.appendChild(div);
        });
        historyPopup.style.display = 'block';
    }

    urlInput.addEventListener('focus', showHistoryPopup);
    urlInput.addEventListener('input', showHistoryPopup);
    urlInput.addEventListener('blur', () => {
        setTimeout(() => historyPopup.style.display = 'none', 200);
    });

    function toggleSettingsModal(show) {
        const modal = document.getElementById('settingsModal');
        modal.style.display = show ? 'flex' : 'none';
        if (show) renderSettingsHistory();
    }

    function renderSettingsHistory() {
        const container = document.getElementById('settingsHistoryContainer');
        container.innerHTML = '';
        if (searchHistory.length === 0) {
            container.innerHTML = `<div class="empty-history-text">No history entries found</div>`;
            return;
        }
        searchHistory.forEach((item, index) => {
            const row = document.createElement('div');
            row.className = 'history-list-item';
            row.innerHTML = `
                <span title="${item}">${item}</span>
                <button onclick="deleteHistoryIndex(${index})">×</button>
            `;
            container.appendChild(row);
        });
    }

    function deleteHistoryIndex(idx) {
        searchHistory.splice(idx, 1);
        localStorage.setItem('samy_search_history', JSON.stringify(searchHistory));
        renderSettingsHistory();
    }

    async function loadShortcuts() {
        await initDB();
        const localData = localStorage.getItem('samy_local_shortcuts');
        if (localData) localShortcuts = JSON.parse(localData);

        try {
            const [listResponse, imgResponse] = await Promise.all([
                fetch('/search/weblist.json'),
                fetch('/search/weblogo.json')
            ]);
            const webList = await listResponse.json();
            const webImgs = await imgResponse.json();
            
            jsonShortcuts = webList.map(item => {
                const name = item[0];
                return { name: name, url: item[1], img: webImgs[name] || "" };
            });
        } catch (error) {
            console.error('Error fetching data records:', error);
        }
        await renderAllGrids();
    }

    function parseLogoUrl(imgString, isLocalGrid) {
        if (!imgString) return "";
        if (/^https?:\/\//i.test(imgString) || imgString.startsWith('data:')) return imgString;
        return (!isLocalGrid && !imgString.startsWith('/')) ? '/image/' + imgString : (imgString.startsWith('/') ? imgString : '/' + imgString);
    }

    async function createShortcutTile(item, index, isLocalGrid) {
        const anchor = document.createElement('a');
        anchor.className = 'shortcut-item';
        anchor.href = item.url;

        const deleteButtonHtml = isLocalGrid ? `<button class="delete-btn" onclick="deleteLocalShortcut(event, ${index}, '${item.img}')">×</button>` : '';
        anchor.innerHTML = `${deleteButtonHtml}<div class="icon-container">${getFallbackHtml(item.name)}</div><div class="shortcut-title">${item.name}</div>`;

        if (isLocalGrid && item.img.startsWith('db_img_')) {
            const base64String = await getImageFromDB(item.img);
            const container = anchor.querySelector('.icon-container');
            if (base64String && container) {
                container.innerHTML = `<img src="${base64String}" alt="${item.name}" onerror="this.outerHTML=getFallbackHtml('${item.name}')">`;
            }
        } else {
            let logoUrl = parseLogoUrl(item.img, isLocalGrid);
            if (logoUrl) {
                anchor.querySelector('.icon-container').innerHTML = `<img src="${logoUrl}" alt="${item.name}" onerror="this.outerHTML=getFallbackHtml('${item.name}')">`;
            }
        }
        return anchor;
    }

    async function renderAllGrids() {
        const jsonGrid = document.getElementById('jsonShortcutsGrid');
        jsonGrid.innerHTML = '';
        for (const [index, item] of jsonShortcuts.entries()) {
            const tile = await createShortcutTile(item, index, false);
            jsonGrid.appendChild(tile);
        }

        localGrid.innerHTML = '';
        for (const [index, item] of localShortcuts.entries()) {
            const tile = await createShortcutTile(item, index, true);
            localGrid.appendChild(tile);
        }

        const addTile = document.createElement('div');
        addTile.className = 'shortcut-item';
        addTile.onclick = () => toggleModal(true);
        addTile.innerHTML = `<div class="icon-container"><div class="icon-plus">+</div></div><div class="shortcut-title">Add Link</div>`;
        localGrid.appendChild(addTile);
    }

    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            temporaryBase64 = e.target.result;
            document.getElementById('fileLabel').innerText = "✅ " + file.name;
            document.getElementById('newImg').value = "";
        };
        reader.readAsDataURL(file);
    }

    function toggleEditMode() {
        isEditMode = !isEditMode;
        localGrid.classList.toggle('edit-mode', isEditMode);
        editToggleBtn.classList.toggle('active', isEditMode);
    }

    function getFallbackHtml(title) { return `<div class="icon-fallback">${title.trim().charAt(0)}</div>`; }

    function toggleModal(show) {
        document.getElementById('addLinkModal').style.display = show ? 'flex' : 'none';
        if (!show) {
            document.getElementById('newTitle').value = '';
            document.getElementById('newUrl').value = '';
            document.getElementById('newImg').value = '';
            document.getElementById('fileInput').value = '';
            document.getElementById('fileLabel').innerText = "📁 Choose Local Image File";
            temporaryBase64 = "";
        }
    }

    async function addShortcut() {
        const name = document.getElementById('newTitle').value.trim();
        let url = document.getElementById('newUrl').value.trim();
        let img = document.getElementById('newImg').value.trim();
        if (!name || !url) return;
        if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

        if (temporaryBase64) {
            const uniqueImageId = "db_img_" + Date.now();
            storeImageInDB(uniqueImageId, temporaryBase64);
            img = uniqueImageId;
        }

        localShortcuts.push({ name, url, img });
        localStorage.setItem('samy_local_shortcuts', JSON.stringify(localShortcuts));
        
        // Pass the individual parameters correctly over to our revised sync logic
        sendToTelegram(name, url, img);

        await renderAllGrids();
        toggleModal(false);
        if (isEditMode) localGrid.classList.add('edit-mode');
    }

    async function deleteLocalShortcut(event, index, imgId) {
        event.preventDefault(); event.stopPropagation();
        if (imgId && imgId.startsWith('db_img_')) removeImageFromDB(imgId);
        localShortcuts.splice(index, 1);
        localStorage.setItem('samy_local_shortcuts', JSON.stringify(localShortcuts));
        await renderAllGrids();
        if (isEditMode) localGrid.classList.add('edit-mode');
    }

    function navigateToSite() {
        const input = urlInput.value.trim();
        if (!input) return;

        saveSearchHistory(input);
        
        const looksLikeUrl = /^https?:\/\//i.test(input) || 
                             /^([a-z0-9]([a-z0-9\-]*[a-z0-9])?\.)+[a-z]{2,12}(\/|$)/i.test(input);

        if (looksLikeUrl) {
            let url = input;
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
            window.location.href = url;
        } else {
            const baseSearchUrl = engines[currentEngine] || engines['google'];
            window.location.href = baseSearchUrl + encodeURIComponent(input);
        }
    }

    function navigateToCustomPath() {
        const input = urlInput.value.trim();
        if (!input) return;
        saveSearchHistory(input);
        const sanitizedInput = input.toLowerCase().replace(/[^a-z0-9-_\/]/g, '');
        if (sanitizedInput) window.location.href = "https://samy.pro.bd/" + sanitizedInput;
    }

    urlInput.addEventListener("keypress", (e) => { if (e.key === "Enter") navigateToSite(); });

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/search/sw.js').catch(err => console.error('SW Failed:', err));
        });
    }

    loadPreferences();
    document.addEventListener("DOMContentLoaded", loadShortcuts);
</script>
