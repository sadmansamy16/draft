<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="A personal, minimalist search hub and bookmark portal.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qsamy Search</title>
    <link href="icon.png" rel="icon" type="image/png" />
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#f5f5f7" id="theme-color-meta">
    
    <style>
        :root {
            --bg-color: #f5f5f7; --surface-color: #ffffff; --text-main: #1d1d1f;
            --text-muted: #86868b; --accent-color: #0071e3; --border-color: #e8e8ed;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05); --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --danger-color: #ff3b30;
        }
        [data-theme="dark"] {
            --bg-color: #000000; --surface-color: #1c1c1e; --text-main: #f5f5f7;
            --text-muted: #8e8e93; --accent-color: #0a84ff; --border-color: #2c2c2e;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; transition: background-color 0.3s ease; }
        .workspace { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 24px; align-items: center; padding-top: 12px; }
        .top-settings-btn { position: absolute; top: 4px; right: 4px; width: 44px; height: 44px; background: transparent; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 200; }
        .search-wrapper { width: 100%; position: relative; }
        .search-bar-container { display: flex; align-items: center; background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 24px; padding: 4px 8px; box-shadow: var(--shadow); }
        .search-icon-btn { background: transparent; border: none; color: var(--text-muted); padding: 8px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; }
        input { flex: 1; border: none; background: transparent; font-size: 17px; color: var(--text-main); outline: none; padding: 14px 0; width: 100%; }
        .go-btn { background: var(--accent-color); color: white; border: none; border-radius: 18px; width: 44px; height: 44px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .history-popup { position: absolute; top: 100%; left: 0; right: 0; background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 20px; margin-top: 8px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); z-index: 99; display: none; padding: 8px 0; }
        .history-item { padding: 12px 20px; cursor: pointer; }
        .history-item:hover { background: var(--bg-color); }
        .shortcuts-grid { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .shortcut-item { position: relative; display: flex; flex-direction: column; align-items: center; text-decoration: none; color: var(--text-main); padding: 8px 4px; cursor: pointer; border-radius: 16px; }
        .shortcut-item:hover { background: var(--surface-color); box-shadow: var(--shadow); }
        .icon-container { width: 52px; height: 52px; background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 14px; display: flex; justify-content: center; align-items: center; margin-bottom: 8px; overflow: hidden; box-shadow: var(--shadow); }
        .icon-container img { width: 100%; height: 100%; object-fit: cover; border-radius: 14px; display: block; }
        .icon-fallback { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; border-radius: 14px; background: rgba(0, 113, 227, 0.05); color: var(--accent-color); font-weight: 600; text-transform: uppercase; }
        .shortcut-title { font-size: 11px; font-weight: 500; text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .delete-btn { position: absolute; top: 2px; right: 2px; width: 18px; height: 18px; background: var(--danger-color); color: white; border-radius: 50%; border: none; display: none; justify-content: center; align-items: center; font-size: 10px; cursor: pointer; }
        .edit-mode .delete-btn { display: flex; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 1000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-card { background: var(--surface-color); padding: 24px; border-radius: 20px; width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }
    </style>
</head>
<body>

<button class="top-settings-btn" onclick="toggleSettingsModal(true)"><svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></button>

<div class="workspace">
    <div class="search-wrapper">
        <div class="search-bar-container">
            <button class="search-icon-btn" id="dynamicEngineBtn" onclick="navigateToCustomPath()"></button>
            <input type="text" id="urlInput" placeholder="Search or type URL" autocomplete="off">
            <button class="go-btn" onclick="navigateToSite()"><svg width="18" height="18" fill="white" viewBox="0 0 24 24"><path d="M5 13h11.86l-5.43 5.43 1.42 1.42L21.14 12l-8.29-8.29-1.42 1.42L16.86 11H5v2z"/></svg></button>
        </div>
        <div class="history-popup" id="historyPopup"></div>
    </div>
    <div class="shortcuts-grid" id="jsonShortcutsGrid"></div>
    <div class="shortcuts-grid" id="localShortcutsGrid"></div>
</div>

<div class="modal-overlay" id="addLinkModal">
    <div class="modal-card">
        <h3>Add Shortcut</h3>
        <input type="text" id="newTitle" placeholder="Name">
        <input type="text" id="newUrl" placeholder="URL">
        <input type="text" id="newImg" placeholder="Image Link">
        <input type="file" id="fileInput" onchange="handleFileSelect(event)">
        <div style="display:flex; gap:10px;">
            <button onclick="toggleModal(false)">Cancel</button>
            <button onclick="addShortcut()">Add</button>
        </div>
    </div>
</div>

<script>
    let jsonShortcuts = [], localShortcuts = [], db = null;

    function initDB() {
        return new Promise((resolve) => {
            const request = indexedDB.open("SamySearchDB", 1);
            request.onupgradeneeded = (e) => e.target.result.createObjectStore("images", { keyPath: "id" });
            request.onsuccess = (e) => { db = e.target.result; resolve(); };
            request.onerror = () => resolve();
        });
    }

    async function loadShortcuts() {
        await initDB();
        localShortcuts = JSON.parse(localStorage.getItem('samy_local_shortcuts') || "[]");
        try {
            const response = await fetch('/weblist.json');
            jsonShortcuts = await response.json();
        } catch(e) { console.error(e); }
        renderAllGrids();
    }

    function renderAllGrids() {
        const jg = document.getElementById('jsonShortcutsGrid'), lg = document.getElementById('localShortcutsGrid');
        jg.innerHTML = ''; lg.innerHTML = '';
        jsonShortcuts.forEach((item, i) => jg.appendChild(createTile(item, i, false)));
        localShortcuts.forEach((item, i) => lg.appendChild(createTile(item, i, true)));
        const add = document.createElement('div');
        add.className = 'shortcut-item'; add.onclick = () => toggleModal(true);
        add.innerHTML = `<div class="icon-container">+</div><div class="shortcut-title">Add</div>`;
        lg.appendChild(add);
    }

    function createTile(item, index, isLocal) {
        const a = document.createElement('a'); a.className = 'shortcut-item'; a.href = item.url;
        a.innerHTML = `${isLocal ? `<button class="delete-btn" onclick="deleteLocal(event,${index})">×</button>` : ''}<div class="icon-container">${item.img ? `<img src="${item.img}">` : item.name[0]}</div><div class="shortcut-title">${item.name}</div>`;
        return a;
    }

    function addShortcut() {
        const name = document.getElementById('newTitle').value, url = document.getElementById('newUrl').value, img = document.getElementById('newImg').value;
        localShortcuts.push({ name, url, img });
        localStorage.setItem('samy_local_shortcuts', JSON.stringify(localShortcuts));
        document.getElementById('newTitle').value = ''; document.getElementById('newUrl').value = ''; document.getElementById('newImg').value = '';
        renderAllGrids(); toggleModal(false);
    }

    function deleteLocal(e, i) { e.preventDefault(); localShortcuts.splice(i, 1); localStorage.setItem('samy_local_shortcuts', JSON.stringify(localShortcuts)); renderAllGrids(); }
    function toggleModal(s) { document.getElementById('addLinkModal').style.display = s ? 'flex' : 'none'; }
    document.addEventListener("DOMContentLoaded", loadShortcuts);
</script>
</body>
</html>
