<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title></title>
    <!-- Bitwarden extracts this icon instantly -->
    <link rel="icon" type="image/png" href="icon.png">
    <style>
        body { margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; background: #fff; font-family: sans-serif; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <script>
        // Redirect to main site after a very short delay
        setTimeout(() => {
            window.location.href = "https://bwi.pages.dev";
        }, 800); 
    </script>
</body>
</html>
