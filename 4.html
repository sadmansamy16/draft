<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="A personal, minimalist search hub and bookmark portal.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Qsamy Search</title>
    <link href="icon.png" rel="icon" type="image/png" />
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#f5f5f7" id="theme-color-meta">
    
    <style>
        :root {
            --bg-color: #f5f5f7;
            --surface-color: #ffffff;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --accent-color: #0071e3;
            --border-color: #e8e8ed;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --danger-color: #ff3b30;
        }

        [data-theme="dark"] {
            --bg-color: #000000;
            --surface-color: #1c1c1e;
            --text-main: #f5f5f7;
            --text-muted: #8e8e93;
            --accent-color: #0a84ff;
            --border-color: #2c2c2e;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background-color: var(--bg-color); 
            color: var(--text-main);
            min-height: 100vh;
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center; 
            padding: 24px 16px; transition: background-color 0.3s ease; position: relative;
        }

        .workspace { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 24px; align-items: center; position: relative; padding-top: 12px; }

        /* Iframe Styles */
        .iframe-section {
            width: 100%;
            margin-top: 12px;
            border-radius: 20px;
            overflow: hidden;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }
        .iframe-header { padding: 12px 16px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; }
        .mini-logo { width: 24px; height: 24px; object-fit: contain; }
        .iframe-section iframe { width: 100%; height: 500px; border: none; display: block; }

        .top-settings-btn { position: absolute; top: 4px; right: 4px; background: transparent; border: none; color: var(--text-muted); display: flex; align-items: center; justify-content: center; cursor: pointer; outline: none; width: 44px; height: 44px; transition: var(--transition); z-index: 200; }
        .top-settings-btn:hover { color: var(--accent-color); }
        .top-settings-btn svg { width: 22px; height: 22px; fill: currentColor; }

        .search-wrapper { width: 100%; position: relative; }
        .search-bar-container { display: flex; align-items: center; background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 24px; padding: 4px 8px; box-shadow: var(--shadow); transition: var(--transition); position: relative; z-index: 100; }
        .search-bar-container:focus-within { border-color: var(--accent-color); box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.12); }

        .search-icon-btn { background: transparent; border: none; color: var(--text-muted); display: flex; align-items: center; justify-content: center; cursor: pointer; outline: none; padding: 8px; border-radius: 50%; transition: var(--transition); margin: 0 4px; width: 36px; height: 36px; }
        .search-icon-btn:hover { background: var(--bg-color); color: var(--accent-color); }
        .search-icon-btn img { width: 20px; height: 20px; object-fit: contain; }
        .search-icon-btn svg { width: 20px; height: 20px; fill: currentColor; }

        input { flex: 1; border: none; background: transparent; font-size: 17px; color: var(--text-main); outline: none; padding: 14px 0; width: 100%; }

        .go-btn { background: var(--accent-color); color: white; border: none; border-radius: 18px; width: 44px; height: 44px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: var(--transition); }
        .go-btn svg { width: 18px; height: 18px; fill: currentColor; }

        .history-popup { position: absolute; top: 100%; left: 0; right: 0; background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 20px; margin-top: 8px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); z-index: 99; overflow: hidden; display: none; padding: 8px 0; }
        .history-item { display: flex; align-items: center; padding: 12px 20px; cursor: pointer; transition: background 0.15s; }
        .history-item:hover { background: var(--bg-color); }
        .history-content { display: flex; align-items: center; gap: 12px; color: var(--text-main); font-size: 15px; flex: 1; min-width: 0; }
        .history-content span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .section-container { width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .shortcuts-grid { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        @media (max-width: 600px) { .shortcuts-grid { gap: 8px; } .iframe-section iframe { height: 300px; } }

        .shortcut-item { position: relative; display: flex; flex-direction: column; align-items: center; text-decoration: none; color: var(--text-main) !important; outline: none; transition: var(--transition); border-radius: 16px; padding: 8px 4px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .shortcut-item:hover { background: var(--surface-color); box-shadow: var(--shadow); transform: translateY(-2px); }

        .icon-container { width: 52px; height: 52px; background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 14px; display: flex; justify-content: center; align-items: center; margin-bottom: 8px; overflow: hidden; box-shadow: var(--shadow); }
        .icon-container img { width: 100%; height: 100%; object-fit: cover; border-radius: 14px; display: block; }
        .icon-fallback { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; border-radius: 14px; }
        .shortcut-title { font-size: 11px; font-weight: 500; color: var(--text-main); text-align: center; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); z-index: 1000; display: none; justify-content: center; align-items: center; padding: 20px; }
        .modal-card { background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 20px; padding: 24px; width: 100%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); display: flex; flex-direction: column; gap: 14px; max-height: 90vh; overflow-y: auto; }
        .modal-card h3 { font-size: 18px; color: var(--text-main); margin-bottom: 4px; }
        .modal-card input, .modal-card select { width: 100%; padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 12px; font-size: 15px; outline: none; background: var(--bg-color); color: var(--text-main); }
        .custom-select-list { display: flex; flex-direction: column; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 14px; overflow: hidden; }
        .custom-select-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; cursor: pointer; transition: var(--transition); border-bottom: 1px solid var(--border-color); }
        .custom-select-item:last-child { border-bottom: none; }
        .custom-select-item:hover { background: var(--surface-color); }
        .custom-select-left { display: flex; align-items: center; gap: 12px; font-size: 15px; font-weight: 500; }
        .custom-select-logo { width: 22px; height: 22px; object-fit: contain; }
        .custom-select-radio { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--text-muted); display: flex; align-items: center; justify-content: center; transition: var(--transition); }
        .custom-select-item.selected .custom-select-radio { border-color: var(--accent-color); }
        .custom-select-item.selected .custom-select-radio::after { content: ''; width: 10px; height: 10px; background: var(--accent-color); border-radius: 50%; display: block; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 6px; }
        .modal-buttons button { flex: 1; padding: 12px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: var(--transition); }
        .btn-cancel { background: var(--border-color); color: var(--text-main); }
        .setting-section { display: flex; flex-direction: column; gap: 8px; padding-bottom: 12px; border-bottom: 1px solid var(--border-color); margin-bottom: 12px; }
        .setting-section:last-of-type { border-bottom: none; }
        .setting-label { font-size: 14px; font-weight: 600; color: var(--text-muted); }
        .history-list-box { background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 12px; max-height: 150px; overflow-y: auto; padding: 4px 0; }
        .history-list-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; font-size: 14px; }
        .history-list-item span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
        .history-list-item button { background: transparent; border: none; color: var(--danger-color); font-weight: bold; cursor: pointer; padding: 0 4px; font-size: 16px; }
        .empty-history-text { text-align: center; color: var(--text-muted); padding: 12px; font-size: 13px; }
    </style>
</head>
<body>

<button class="top-settings-btn" onclick="toggleSettingsModal(true)" title="Settings">
    <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
</button>

<div class="workspace">
    <div class="search-wrapper">
        <div class="search-bar-container">
            <button class="search-icon-btn" id="dynamicEngineBtn" onclick="navigateToCustomPath()">
                <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </button>
            <input type="text" id="urlInput" placeholder="Search or type URL" inputmode="search" autocomplete="off" spellcheck="false">
            <button class="go-btn" onclick="navigateToSite()">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
        <div class="history-popup" id="historyPopup"></div>
    </div>

    <div class="section-container">
        <div class="shortcuts-grid" id="jsonShortcutsGrid"></div>
    </div>

    <!-- Iframe Section Added Here -->
    <div class="iframe-section">
        <div class="iframe-header">
            <img src="icon.png" alt="Logo" class="mini-logo">
        </div>
        <iframe src="https://3.s33.pages.dev" title="Portal"></iframe>
    </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
    <div class="modal-card">
        <h3>Settings</h3>
        <div class="setting-section">
            <div class="setting-label">Appearance Theme</div>
            <select id="themeSelect" onchange="changeTheme(this.value)">
                <option value="light">☀️ Light Mode</option>
                <option value="dark">🌙 Dark Mode</option>
            </select>
        </div>
        <div class="setting-section">
            <div class="setting-label">Default Search Engine</div>
            <div class="custom-select-list" id="customEngineSelector">
                <!-- Engine options -->
            </div>
        </div>
        <div class="modal-buttons">
            <button class="btn-cancel" onclick="toggleSettingsModal(false)" style="width:100%">Close</button>
        </div>
    </div>
</div>

<script>
    // ... [Previous JavaScript logic remains the same] ...
</script>
</body>
</html>
