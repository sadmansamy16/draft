<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>404 | Qsamy</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --surface-color: rgba(255, 255, 255, 0.8);
            --text-main: #1d1d1f;
            --accent-color: #0071e3;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text-main);
        }

        .card {
            background: var(--surface-color);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 320px;
            width: 90%;
        }

        .spinner {
            border: 3px solid rgba(0, 0, 0, 0.05);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border-left-color: var(--accent-color);
            animation: spin 0.6s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }

        .home-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="spinner" id="spinner"></div>
        <h2 id="status">Connecting...</h2>
        <a href="https://samy.pro.bd" class="home-btn" id="homeBtn" style="display:none;">Back to Home</a>
    </div>

    <script>
        async function handleHybridRedirect() {
            const path = window.location.pathname.replace(/^\/|\/$/g, '').toLowerCase();
            if (!path) return showError("Welcome! Please provide a short code.");

            try {
                const response = await fetch('/urls.json');
                const urlDatabase = await response.json();

                if (urlDatabase[path]) {
                    window.location.replace(urlDatabase[path]);
                } else if (urlDatabase['ui-' + path]) {
                    setTimeout(() => window.location.replace(urlDatabase['ui-' + path]), 300);
                } else {
                    showError("Link not found.");
                }
            } catch (e) {
                showError("Database connection error.");
            }
        }

        function showError(message) {
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('status').innerText = message;
            document.getElementById('homeBtn').style.display = 'inline-block';
        }

        handleHybridRedirect();
    </script>
</body>
</html>
