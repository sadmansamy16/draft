<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        /* Hidden by default so instant links do not flash an empty white layout */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            display: none; 
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f9f9f9;
            color: #333;
        }
        .container { text-align: center; }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #007bff;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="spinner"></div>
        <h2 id="status">Connecting securely...</h2>
    </div>

    <script>
        async function handleHybridRedirect() {
            // ─── CONFIGURATION ──────────────────────────────────────────
            const QUICK_UI_DELAY = 800; // 800 milliseconds = 0.8 seconds delay
            // ────────────────────────────────────────────────────────────

            // 1. Extract the code from the URL path and switch to lowercase
            const path = window.location.pathname.replace(/^\/|\/$/g, '');
            const shortCode = path.toLowerCase();

            if (!shortCode) {
                showError("Welcome! Please provide a short code.");
                return;
            }

            try {
                // 2. Fetch your live database file
                const response = await fetch('/urls.json');
                if (!response.ok) throw new Error('Database error');
                const urlDatabase = await response.json();

                // Check 1: Is it a regular, instant link? (No UI layout triggered)
                if (urlDatabase[shortCode]) {
                    window.location.replace(urlDatabase[shortCode]);
                    return;
                }

                // Check 2: Is it a UI link? (Shows UI spinner, then jumps quickly)
                const uiCode = 'ui-' + shortCode;
                if (urlDatabase[uiCode]) {
                    // Turn on the user interface screen layout instantly
                    document.body.style.display = 'flex';

                    // Spin for exactly 0.8 seconds, then execute the link replacement
                    setTimeout(() => {
                        window.location.replace(urlDatabase[uiCode]);
                    }, QUICK_UI_DELAY);
                    return;
                }

                // Fallback if the code doesn't exist anywhere in the database
                showError("404 - Link Not Found");

            } catch (error) {
                showError("System Error: Could not load data configuration.");
            }
        }

        function showError(message) {
            document.body.style.display = 'flex';
            document.querySelector('.spinner').style.display = 'none';
            document.getElementById('status').innerText = message;
            document.getElementById('status').style.color = '#dc3545';
        }

        // Initialize sorting process immediately when code triggers
        handleHybridRedirect();
    </script>
</body>
</html>
